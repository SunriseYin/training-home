<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的训练主页</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    header {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .header-text {
      text-align: center;
      flex: 1;
      min-width: 260px;
    }

    .header-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header-buttons button {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .header-buttons button:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    header h1 {
      margin: 0;
      font-size: 34px;
    }

    header p {
      margin-top: 12px;
      font-size: 16px;
      opacity: 0.9;
    }

    main {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .section-title {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 24px;
      text-decoration: none;
      color: #222;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      transition: all 0.2s ease;
      border: 1px solid #e5e7eb;
      display: block;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.14);
    }

    .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: #3498db;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 21px;
    }

    .card p {
      margin: 0;
      color: #666;
      font-size: 15px;
      line-height: 1.6;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }

    .tag {
      display: inline-block;
      margin-top: 16px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #ecf5ff;
      color: #2980b9;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="header-text">
        <h1>我的训练主页</h1>
        <p>集中管理你的小游戏、统计面板和训练数据。</p>
      </div>
      <div class="header-buttons">
        <button id="export-btn">导出数据</button>
        <button id="import-btn">导入数据</button>
        <button id="help-btn">帮助</button>
      </div>
    </div>
  </header>

  <main>
    <h2 class="section-title">训练工具</h2>

    <div class="card-grid">
      <a class="card" href="games/attention_game_with_history.html">
        <div class="card-icon">🎯</div>
        <h2>注意力训练小游戏</h2>
        <p>通过点击绿色圆点、避开红色圆点，训练选择性注意、反应速度和抑制控制。现已支持 1、5、10 分钟训练。</p>
        <span class="tag">注意力训练</span>
      </a>

      <a class="card" href="#">
        <div class="card-icon">🫁</div>
        <h2>呼吸放松训练</h2>
        <p>这里可以以后放一个呼吸节奏训练页面，比如 4-2-6 呼吸法。</p>
        <span class="tag">待添加</span>
      </a>

      <a class="card" href="training-data-statistics.html">
        <div class="card-icon">📊</div>
        <h2>训练数据统计</h2>
        <p>查看本地训练历史、贡献日历和训练活动时间线，并区分不同训练时长的记录。</p>
        <span class="tag">统计分析</span>
      </a>
    </div>
  </main>

  <footer>
    训练贵在稳定，不在一次练很久。
  </footer>

  <script>
    const STORAGE_KEY = "attentionGameHistory";
    const DEFAULT_DURATION_MINUTES = 1;
    const SUPPORTED_DURATIONS = [1, 5, 10];

    function roundTo(value, digits = 1) {
      const factor = 10 ** digits;
      return Math.round(value * factor) / factor;
    }

    function getDurationLabel(minutes) {
      return `${minutes} 分钟`;
    }

    function normalizeHistoryItem(item) {
      const durationMinutesValue = Number(item.durationMinutes);
      const durationSecondsValue = Number(item.durationSeconds);

      let durationMinutes = durationMinutesValue;
      if (!SUPPORTED_DURATIONS.includes(durationMinutes)) {
        durationMinutes = durationSecondsValue > 0 ? Math.round(durationSecondsValue / 60) : DEFAULT_DURATION_MINUTES;
      }
      if (!SUPPORTED_DURATIONS.includes(durationMinutes)) {
        durationMinutes = DEFAULT_DURATION_MINUTES;
      }

      const durationSeconds = durationMinutes * 60;
      const score = Number(item.score) || 0;
      const mistakes = Number(item.mistakes) || 0;
      const totalClicks = Number(item.totalClicks) || 0;
      const accuracy = Number.isFinite(Number(item.accuracy))
        ? Number(item.accuracy)
        : (totalClicks === 0 ? 0 : Math.round((score / totalClicks) * 100));
      const avgReaction = Number(item.avgReaction) || 0;
      const timestamp = Number(item.timestamp) || Date.now();
      const scorePerMinute = Number.isFinite(Number(item.scorePerMinute))
        ? Number(item.scorePerMinute)
        : roundTo(score / durationMinutes, 1);

      return {
        time: item.time || "",
        timestamp,
        durationMinutes,
        durationSeconds,
        durationLabel: item.durationLabel || getDurationLabel(durationMinutes),
        score,
        scorePerMinute,
        mistakes,
        totalClicks,
        accuracy,
        avgReaction
      };
    }

    function parseAttentionGameHistory(rawValue) {
      if (!rawValue) {
        return [];
      }

      if (Array.isArray(rawValue)) {
        return rawValue.map(normalizeHistoryItem);
      }

      if (typeof rawValue === "string") {
        try {
          const parsed = JSON.parse(rawValue);
          return Array.isArray(parsed) ? parsed.map(normalizeHistoryItem) : [];
        } catch (error) {
          return [];
        }
      }

      return [];
    }

    function buildExportData() {
      return {
        version: 2,
        exportedAt: new Date().toISOString(),
        storage: {
          [STORAGE_KEY]: parseAttentionGameHistory(localStorage.getItem(STORAGE_KEY))
        }
      };
    }

    function getImportStorageData(parsedData) {
      if (parsedData && typeof parsedData === "object" && parsedData.storage && typeof parsedData.storage === "object") {
        return parsedData.storage;
      }

      return parsedData;
    }

    document.getElementById("export-btn").addEventListener("click", () => {
      const data = buildExportData();
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `training-data-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-")}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById("import-btn").addEventListener("click", () => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".json";
      input.onchange = (event) => {
        const file = event.target.files[0];
        if (!file) {
          return;
        }

        const reader = new FileReader();
        reader.onload = (loadEvent) => {
          try {
            const parsed = JSON.parse(loadEvent.target.result);
            const storageData = getImportStorageData(parsed);

            if (!storageData || typeof storageData !== "object") {
              throw new Error("invalid storage data");
            }

            Object.entries(storageData).forEach(([key, value]) => {
              if (key === STORAGE_KEY) {
                localStorage.setItem(key, JSON.stringify(parseAttentionGameHistory(value)));
                return;
              }

              if (typeof value === "string") {
                localStorage.setItem(key, value);
              } else {
                localStorage.setItem(key, JSON.stringify(value));
              }
            });

            alert("数据导入成功");
          } catch (error) {
            alert("JSON parse failed. Please check the file format.");
          }
        };
        reader.readAsText(file);
      };
      input.click();
    });

    document.getElementById("help-btn").addEventListener("click", () => {
      window.open("https://github.com/SunriseYin/training-home", "_blank");
    });
  </script>
</body>
</html>
